{% extends 'base.html' %}

{% block body %}
<h3 class="text-center m-4">Student Marks</h3>
<div class="card border-info mb-4 ms-4 me-4" >
    <div class="card-header"><h3><strong>{{ marks.0.student.student_name }}</strong></h3></div>
    <div class="card-body">
      <p class="card-text">
        <table class="table table-hover">
            <thead>
              <tr>
                <th scope="col">Subject</th>
                <th scope="col">Semester</th>
                <th scope="col">Marks</th>
              </tr>
            </thead>
            <tbody>
              {% for marks in marks %}  
              <tr class="table-info">
                <td>{{ marks.subject.subject_name }}</td>
                <td>{{ marks.subject.semester }}</td>
                <td>{{ marks.marks }}</td>
              </tr>
              {% endfor %}
            </tbody>
          </table>
      </p>
    </div>
  </div>

{% endblock %}
