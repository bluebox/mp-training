{% extends 'base.html' %}

{% block body %}
<h3 class="text-center m-4">Update student details</h3>
{% if success %}
   <div class="alert alert-success" role="alert">
     Student details has been added successfully.
     <a href="{% url 'index' %}" class="alert-link">Go to home page.</a>
   </div>
{% else %}
   <div class="row justify-content-center">
    <div class="col-6">
        <div class="card bg-light mb-3">
            <div class="card-header">
                <i class="fa-solid fa-pen-to-square fa-lg"></i> Update Student Details
            </div>
            <div class="card-body">
              <form action="" method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary">Update</button>
                <a href="{% url 'index' %}" class="btn btn-secondary">Cancel</a>
              </form>
            </div>
          </div>
    </div>
   </div>
{% endif %}
{% endblock %}
