
{% extends "base.html" %}

{% block body %}
  <h3 class="text-center m-4">Add Student</h3>
  {% if success %}
    <div class="alert alert-success" role="alert">
      The new student added successfully.
      <a href="{% url 'list_item' %}" class="alert-link">Go to Home Page.</a>
    </div>
  {% else %}
    <div class="row justify-content-center">
      <div class="col-6">
        <div class="card bg-light mb-3">
          <div class="card-header">
            <i class="fa-solid fa-address-card fa-lg"></i> Student Registration
          </div>
          <div class="card-body">
              <form action="{% url 'marks_add' %}" method="post">
                {% csrf_token %}
                Student Id:<br>
                <input name="first">
                <br><br>
                Subject Id:<br>
                <input name="second">
                <br><br>
                Marks Scored:<br>
                <input name="forth">
                <br><br>
                Semester:<br>
                <input name="fifth">
              <button type="submit" class="btn btn-primary">Add</button>

              <a href="{% url 'stu' %}" class="btn btn-secondary">Cancel</a>
            </form>
          </div>
        </div>
      </div>
    </div>
  {% endif %}
{% endblock %}
