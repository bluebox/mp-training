<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .review{
            padding: 10px;
            background-color: antiquewhite;
            border: 1px solid black;
            text-align: left;
            margin-top: 100px;
            /* margin-left: 100px; */
            width:50%;
            height: 60vh;
            margin-left: 250px;
            font-size:30px;
        
        }
    </style>
</head>
<body>
    <div class="review">
        <form>
            <form>
                <h1>Share your experience...</h1>
                <div class="form-group">
                  <label for="exampleFormControlInput1">Email address</label>
                  <input type="email" class="form-control" id="exampleFormControlInput1" placeholder="name@example.com" style="height:35px;width:500px">
                </div><br>
                <div class="form-group">
                    <label for="exampleFormControlInput1">Username</label>
                    <input type="text" class="form-control" id="exampleFormControlInput2" style="height:35px;width:545px">
                  </div><br>
                <div class="form-group">
                  <label for="exampleFormControlSelect1">Give your rating</label>
                  <select class="form-control" id="exampleFormControlSelect1"style="height:35px;width:50px">
                    <option>1</option>
                    <option>2</option>
                    <option>3</option>
                    <option>4</option>
                    <option>5</option>
                  </select>
                </div><br>
            
                <div class="form-group">
                  <label for="exampleFormControlTextarea1">Tell us about your experience-</label>
                  <textarea class="form-control" id="exampleFormControlTextarea1" rows="5" cols="78"></textarea>
                </div><br>
                <button type="button" style="background-color:green ;text-align: center;height:35px;width:680px" onclick="alert('Thank You')">Submit</button>
              </form>
        </form>
    </div>
</body>
</html>
