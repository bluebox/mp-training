<app-student-navbar></app-student-navbar>
  
 <div class="coursetable">
    <div class="head">Total Attempts</div>
    <table mat-table [dataSource]="scores" class="mat-elevation-z8">
  
      <ng-container matColumnDef="s.no" >
        <th mat-header-cell *matHeaderCellDef>Attempt </th>
        <td mat-cell *matCellDef="let question; let i=index"> {{i+1}} </td>
      </ng-container>
      <!-- Name Column -->
      <ng-container matColumnDef="exam_name">
        <th mat-header-cell *matHeaderCellDef>Course Name  </th>
        <td mat-cell *matCellDef="let question "> {{question.exam_name}} </td>
    
      </ng-container>
      <ng-container matColumnDef="score">
        <th mat-header-cell *matHeaderCellDef>Score </th>
        <td mat-cell *matCellDef="let question "> {{question.score}} </td>
    
      </ng-container>
      <ng-container matColumnDef="date">
        <th mat-header-cell *matHeaderCellDef>Date </th>
        <td mat-cell *matCellDef="let question "> {{question.date}} </td>
    
      </ng-container>
  
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </div>
