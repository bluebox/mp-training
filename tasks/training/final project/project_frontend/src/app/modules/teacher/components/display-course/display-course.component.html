<p>display-course works</p>
<div class="coursetable">
<table mat-table [dataSource]="courses" class="mat-elevation-z8">

    <!--- Note that these columns can be defined in any order.
          The actual rendered columns are set as a property on the row definition" -->
  
    <!-- Position Column -->
    <ng-container matColumnDef="course_name">
      <th mat-header-cell *matHeaderCellDef> Course Name </th>
      <td mat-cell *matCellDef="let element"> {{element.course_name}} </td>
    </ng-container>
  
    <!-- Name Column -->
    <ng-container matColumnDef="total_marks">
      <th mat-header-cell *matHeaderCellDef> Total Marks </th>
      <td mat-cell *matCellDef="let element"> {{element.total_marks}} </td>
    </ng-container>

    <!-- <ng-container matColumnDef="update">
        <th  mat-header-cell *matHeaderCellDef mat-sort-header>Update</th>
        <td mat-cell *matCellDef="let row">
          <button mat-icon-button color="primary">
            <mat-icon>update</mat-icon>
            
          </button>
        </td>
      </ng-container> -->

      <ng-container matColumnDef="Action">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Action</th>
        <td mat-cell *matCellDef="let row">
         
          <button mat-icon-button color="primary" ><mat-icon>edit</mat-icon></button>
          <button mat-icon-button color="warn" (click)="deleteCourse(row.id)"><mat-icon>delete</mat-icon></button>
          <!-- <button mat-icon-button color="primary" ><mat-icon>remove_red_eye</mat-icon></button> -->
        </td>
      </ng-container>
  
  
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>


  
  </table>
  <mat-paginator [length]="100"
              [pageSize]="10"
              [pageSizeOptions]="[2,5, 10, 25, 100]"
              aria-label="Select page">
</mat-paginator>
</div>
