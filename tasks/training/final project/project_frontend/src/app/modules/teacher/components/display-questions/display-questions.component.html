<p>display-questions works!</p>
<div class="questiontable">
<table mat-table [dataSource]="questions" class="mat-elevation-z8">

    <!--- Note that these columns can be defined in any order.
          The actual rendered columns are set as a property on the row definition" -->
  
    <!-- Position Column -->
    <ng-container matColumnDef="question_name">
      <th mat-header-cell *matHeaderCellDef>Question Name </th>
      <td mat-cell *matCellDef="let question"> {{question.question_name}} </td>
    </ng-container>
  
    <!-- Name Column -->
    <ng-container matColumnDef="course">
      <th mat-header-cell *matHeaderCellDef>Course Name  </th>
      <td mat-cell *matCellDef="let question "> {{question.course_name}} 
         </td>
         <!-- <td mat-cell *ngFor="let i of h">{{i}}</td> -->


    </ng-container>



    <ng-container matColumnDef="Action">
        <th mat-header-cell *matHeaderCellDef mat-sort-header >Action</th>
        <td mat-cell *matCellDef="let row">
         <!--  -->
            <!-- <button mat-icon-button color="primary" ><mat-icon>remove_red_eye</mat-icon></button> -->
          <button mat-icon-button color="primary"><mat-icon>edit</mat-icon></button>
          <button mat-icon-button color="warn" (click)="deleteQuestion(row.id)" ><mat-icon>delete</mat-icon></button>
          
        </td>
      </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</div>
