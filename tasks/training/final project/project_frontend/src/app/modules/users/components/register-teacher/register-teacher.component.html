<p>register-teacher works!</p>

<form  [formGroup]="teacherRegisterForm" class="form-container">
    <mat-card>
      <mat-card-header>
        <mat-card-title>Register</mat-card-title>
        <small *ngIf="formNotValid">Please fill all required details</small>
      </mat-card-header>
      <mat-card-content>
        <div class="row">
          <div class="col-md-6">
            <mat-form-field class="full-width">
              <input formControlName="username" matInput placeholder="username">
            </mat-form-field>
            <small class="text-danger" *ngIf="teacherRegisterForm.get('username')?.invalid  && teacherRegisterForm.get('username')?.touched " >username is required</small>
          </div>
          <div class="col-md-6">
            <mat-form-field class="full-width">
              <input formControlName="first_name" matInput placeholder="first name">
            </mat-form-field>
            <small class="text-danger" *ngIf="teacherRegisterForm.get('first_name')?.invalid  && teacherRegisterForm.get('first_name')?.touched " >This field is required</small>
          </div>
          <div class="col-md-6">
            <mat-form-field class="full-width">
              <input formControlName="last_name" matInput placeholder="last name">
            </mat-form-field>
            <small class="text-danger" *ngIf="teacherRegisterForm.get('last_name')?.invalid  && teacherRegisterForm.get('last_name')?.touched " >This field is required</small>
          </div>
          <div class="col-md-6">
            <mat-form-field class="full-width">
              <input formControlName="email" matInput placeholder="email">
            </mat-form-field>
            <small class="text-danger" *ngIf="teacherRegisterForm.get('email')?.invalid  && teacherRegisterForm.get('email')?.touched " >Please enter valid email</small>
          </div>
          <div class="col-md-6">
            <mat-form-field class="full-width">
              <input type="password" formControlName="password" matInput placeholder="password">
            </mat-form-field>
            <small class="text-danger" *ngIf="teacherRegisterForm.get('password')?.invalid  && teacherRegisterForm.get('password')?.touched " >Password should contain atleast 8 letters</small>
          </div>
          <div class="col-md-6">
            <mat-form-field class="full-width">
              <input formControlName="mobile_no" matInput placeholder="mobile number">
            </mat-form-field>
          </div>
          <div class="col-md-6">
            <mat-form-field class="full-width">
              <input formControlName="address" matInput placeholder="address">
            </mat-form-field>
          </div>
          <div class="col-md-6">
            <mat-form-field class="full-width">
              <input formControlName="qualification" matInput placeholder="qualification">
            </mat-form-field>
            <small class="text-danger" *ngIf="teacherRegisterForm.get('qualification')?.invalid  && teacherRegisterForm.get('qualification')?.touched " >This field is required</small>
          </div>
          <div class="col-md-6">
            <mat-form-field class="full-width">
              <input formControlName="position" matInput placeholder="position">
            </mat-form-field>
          </div>
        </div>
      </mat-card-content>
      <mat-card-actions>
        <button (click)="submitRegister()" mat-raised-button="" color="primary">Register</button>
      </mat-card-actions>
    </mat-card>
  </form>
