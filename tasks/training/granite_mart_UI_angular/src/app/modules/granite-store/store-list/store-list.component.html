<app-admin-dashboard ></app-admin-dashboard>
<div class="dataTable">
    <p class="heading">Granite Stores List</p>
    <table align="center">
        <button ><a [routerLink]="['/storeRegistration']" style="text-decoration:none">add new store</a></button>
        <br><br>
        <tr class="row">
            <th>Store Name</th>
            <th>description</th>
            <th>Contact</th>
            <th>Email id</th>
            <th>Edit/Delete</th>
        </tr>
        <tr class="row" *ngFor="let i of storeList" >
            <td>{{i.store_name}}</td>
            <td>{{i.store_description}}</td>
            <td>{{i.contact}}</td>
            <td>{{i.address}}</td>
            <td><span><button (click)="editStore(i.store_id)">Edit</button></span>
                &nbsp;&nbsp;<span><button
                    (click)="deleteStore(i.store_id)">Delete</button></span></td>
        </tr>

    </table>
</div>
