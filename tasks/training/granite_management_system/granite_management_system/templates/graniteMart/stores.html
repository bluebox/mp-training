<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stores</title>
    <script>
        function fun(obj){
            console.log(obj.id)
            window.open("productspage/"+obj.id,"_self")
        }
    </script>
</head>
<body>
    {%for i in stores%}
        <h2 onclick="fun(this)" id={{i.store_id}}>{{i.store_name}}</h2>
    {% endfor %}
</body>
</html>
