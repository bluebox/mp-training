<div class="dataTable">
    <h1 class=".heading">User Login</h1>
    <form [formGroup]="customerLogin">

        <table align="center">
            <tr class="row"><td>UserName: </td><td><input type="text" formControlName="customer_id"></td></tr>
            <tr class="row"><td>Password: </td><td><input type="password" formControlName="password"></td></tr>
            <tr class="row"><td></td><td><input class="save" type="reset">&nbsp;&nbsp;<button class="save" (click)="login()">login</button></td></tr>
        </table>
        <p>Are You New User?<span><a [routerLink]="['/customerRegistration']">Signup</a></span></p>
   
    </form>
</div>
