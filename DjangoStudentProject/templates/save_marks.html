{%extends 'base.html' %}
{% block body %}
<div class="container">
  <h3 class="form-captions">Enter Student Marks</h3>
<div class="input-group input-group mb-4">
  <span class="input-group-text"><b>Name</b></span>
  <input type="text" class="form-control" value="{{std.name}}" disabled>
  <span class="input-group-text"><b>Semester</b></span>
  <input type="text" class="form-control" value="{{std.sem_id.sem_name}}" disabled>
</div>
<form method="POST" action="marks/{{std.id}}">
  {% csrf_token %}
<div class="form-group row">
    <label for="inputSub1" class="col-sm-2 col-form-label">{{sub1}}</label>{% for i in form.sub1 %} <small>{{i}}</small> {%endfor%}
    <div class="col-sm-10">
      <input type="number" class="form-control" id="inputSub1" placeholder="Enter Percentage" name="sub1">
    </div>
  </div>
  <div class="form-group row">
    <label for="inputSub2" class="col-sm-2 col-form-label">{{sub2}}</label>{% for i in form.sub2 %} <small>{{i}}</small> {%endfor%}
    <div class="col-sm-10">
      <input type="number" class="form-control" id="inputSub2" placeholder="Enter Percentage" name="sub2">
    </div>
  </div>
  <div class="form-group row">
    <label for="inputSub3" class="col-sm-2 col-form-label">{{sub3}}</label>{% for i in form.sub3 %} <small>{{i}}</small> {%endfor%}
    <div class="col-sm-10">
      <input type="number" class="form-control" id="inputSub3" placeholder="Enter Percentage" name="sub3">
    </div>
  </div>
  <div class="form-group row">
    <label for="inputSub4" class="col-sm-2 col-form-label">{{sub4}}</label>{% for i in form.sub4 %} <small>{{i}}</small> {%endfor%}
    <div class="col-sm-10">
      <input type="number" class="form-control" id="inputSub4" placeholder="Enter Percentage" name="sub4">
    </div>
  </div>
  <button type="submit" class="btn btn-primary">Submit</button>
</form>
</div>
{% endblock body %}
