<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">

    <title>{%block title%}{%endblock title%}</title>
      <style>
          .Validation-error{
            color: red;
            display: block;
          }
          .form, .container{
            width: 70%;
            margin: 50px auto;
            background: rgba(255, 255, 255);
            border-radius: 10px;
          }
          .table{
            width: 96%;
            margin: 40px auto;
            background: rgba(255, 255, 255);
            border-radius: 10px;
          }
          .form-captions{
            text-align: center;
            margin: 20px;
          }
          .custom-select{
            display: inline;
            width: 70%;
            font-family: sans-serif;
            color: rgba(0,0,50,0.7);
            border: 2px solid rgba(0,0,50,0.7);
          }
          .button{
            width: 20%;
            font-family: sans-serif;
            color: #24a0ed;
            margin: 4px;
            color: white;
            height: 24px;
          }
          .filter{
            margin: 16px;
            width: 300px
          }
          .filter input{
            margin: 8px;
          }
      </style>
  </head>
  <body>

<!--navbaar-->
  <nav class="navbar navbar-expand-lg navbar-light bg-light">
  <a class="navbar-brand" href="#">Navbar</a>
  <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
    <span class="navbar-toggler-icon"></span>
  </button>

  <div class="collapse navbar-collapse" id="navbarSupportedContent">
    <ul class="navbar-nav mr-auto">
      <li class="nav-item active">
        <a class="nav-link" href="/index">Home <span class="sr-only">(current)</span></a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="/student_details">Student Details</a>
      </li>
       <li class="nav-item">
        <a class="nav-link" href="/marks">Marks</a>
      </li>
       <li class="nav-item">
        <a class="nav-link" href="/subject">Subject Entries</a>
      </li>
    </ul>
      <form class="form-inline my-2 my-lg-0" method="post" action="{% url 'std_profile' %}">
          {% csrf_token %}
          {% for i in form.std_id%} <small class="Validation-error" style="margin: 8px;">{{i}}</small>{%endfor%}
      <input class="form-control mr-sm-2" type="search" placeholder="Search" aria-label="Search" name="std_id">
      <button class="btn btn-outline-success my-2 my-sm-0" type="submit">Search</button>
    </form>
  </div>
</nav>

    {%block body%}{%endblock body%}
    <!-- Optional JavaScript -->
    <!-- jQuery first, then Popper.js, then Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.7/dist/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/js/bootstrap.min.js" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>
  </body>
</html>
