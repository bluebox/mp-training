{% load static %}
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">

<style>
    .card{
        box-sizing: border-box;
        width: 50%;
        border-radius: 10px;
        margin: 2% auto;
        padding: 1%;
        box-shadow: -10px -10px 10px 10px rgba(0, 0, 50, 0.3);
    }

    .flex-container{
        display: flex;
    }

    .flex-child{
        flex: 1;
    }
    .flex-child:first-child{
        margin-right: 20px;
    }
    .upper_right{
        margin-top: 5%;
    }
    img {
        display: block;
        width: 60%;
        height: 80%;
        margin: 10% auto;
        border-radius: 80px;
        box-shadow: -10px -10px 10px 10px rgba(0, 0, 0, 0.1);
    }
    .form-label, .form-input, .custom-select{
        display: block;
        width: 100%;
        font-family: sans-serif;
        color: rgba(0,0,50,0.7);
        margin: 10px 0px 20px -20px;
    }
    .form-input{
        line-height: 24px;
        margin-top: -15px;
        border: 2px solid rgba(0,0,50,0.7);
    }
    .custom-select{
        padding: 1%;
        margin-top: -15px;
        border: 2px solid rgba(0,0,50,0.7);
    }
    .form-input-table{
        line-height: 24px;
        margin: -5px;
        border-style: none;
        width: 100px;
    }
    .button{
        margin: 10px;
        padding: 5px;
        color: white;
        font-size: 18px;
        border: none;
    }
    .button:hover{
        box-shadow: -5px -5px 5px 5px rgba(0,0,0,0.1);
    }
    .button-group{
        display: block;
        width: 265px;
        margin: 10px auto;
    }
    .green{
        background-color: rgb(27, 163, 156);
    }
    .orange{
        background-color: rgb(249, 191, 59);
    }
    .red{
        background-color: rgb(196, 77, 86);
    }
    .right{
        width: 70%
    }
    table{
        border-collapse: collapse;
        border:none;
        width: 100%;
    }
    th, td{
        padding: 8px;
        text-align: left;
        border: 1px solid #ddd;
        border-style: none none solid none;
    }
    a{
        text-decoration: none;
        color: white;
    }
</style>
</head>
<body>
    <form action="update_student/{{x.id}}" method="post" class="form">
    {% csrf_token %}
    <div class="card">
        <div class="flex-container upper_half">
            <div class="flex-child upper_left">
                <div class="student_profile_photo">
                    {% if x.gender == "Male" %}
                    <img src="{% static 'boy-student.png' %}" alt="Student profile"/>
                    {% else %}
                    <img src="{% static 'girl-student.png' %}" alt="Student profile"/>
                    {% endif %}
                </div>
            </div>
            <div class="flex-child upper_right">

                <label for="studentName" class="form-label">Name: </label>
                <input class="form-input" type="Text" value="{{x.name}}" id="studentName" name="name">

                <label for="studentPhone" class="form-label">Phone: </label>
                <input class="form-input" type="Text" value="{{x.phone}}" id="studentPhone" name="phone">

                <label for="studentAddress" class="form-label">Address: </label>
                <input class="form-input" type="Text" value="{{x.address}}" id="studentAddress" name="address">

                <label for="studentGender" class="form-label">Gender: </label>
                <select class="custom-select" aria-label="Default select example" id="studentGender" name="gender">
                    <option selected>{{x.gender}}</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>

                <label for="studentBranch" class="form-label">Branch: </label>
                <select class="custom-select" aria-label="Default select example" id="studentBranch" name="branch">
                    <option selected value="{{x.branch_id.id}}">{{x.branch_id.name}}</option>
                   {% for i in branch %}
                    <option value={{i.id}}>{{i.name}}</option>
                   {% endfor %}
                </select>
            </div>
        </div>
        <div class="lower_half">
            {% for i in result%}
                <div class="input-group input-group mb-4" style="width:50%;">
                    <span class="input-group-text"><b>Semester</b></span>
                    <input type="text" class="form-control" value="{{i.sub.0.sem_id.sem_name}}" disabled>
                </div>

                <table border="2" style="margin-bottom:40px;">
                <tr>
                    <th>Subject</th>
                    {% for j in i.sub %}
                    <th>{{j.name}}</th>
                    {% endfor %}
                </tr>
                <tr>
                    <th>Marks</th>
                    {% for j in i.marks %}
                    <td><input class="form-input-table" name="{{j.sub_id.name}}" value="{{j.marks_obtained}}"></td>
                    {% endfor %}
                </tr>
            </table>
            {% endfor %}
              <div class="button-group">
                  <button class="button red" type="Submit"><a href="delete/{{x.id}}">Delete</a></button>
                  <input class="button orange" type="Submit" value="Update">
                  <button class="button green" type="Submit" ><a href="cancel/">Cancel</a></button>
              </div>
        </div>
    </div>
    </form>

</body>

</html>
